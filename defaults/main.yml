---
azuracast_base_dir: /var/azuracast
azuracast_release_channel: latest

# Ports
azuracast_http_port: 80
azuracast_https_port: 443
azuracast_sftp_port: 2022

# User IDs for container
azuracast_puid: 1000
azuracast_pgid: 1000

# NGINX
azuracast_nginx_timeout: 1800

# Application environment
azuracast_application_env: production
azuracast_composer_plugin_mode: false
azuracast_auto_assign_port_min: 8000
azuracast_auto_assign_port_max: 8499
azuracast_show_detailed_errors: false

# Database
azuracast_mysql_host: localhost
azuracast_mysql_port: 3306
azuracast_mysql_user: azuracast
azuracast_mysql_password: azur4c457
azuracast_mysql_database: azuracast
azuracast_mysql_random_root_password: true

# Redis
azuracast_enable_redis: true
azuracast_redis_host: localhost
azuracast_redis_port: 6379
azuracast_redis_db: 1

# PHP
azuracast_php_max_file_size: 25M
azuracast_php_memory_limit: 128M
azuracast_php_max_execution_time: 30

# Sync
azuracast_sync_short_execution_time: 600
azuracast_sync_long_execution_time: 1800

# Now Playing
azuracast_now_playing_delay_time: 0
azuracast_now_playing_max_concurrent_processes: 5

# PHP-FPM
azuracast_php_fpm_max_children: 5

# Traefik integration
azuracast_traefik_enabled: false
azuracast_traefik_domain: radio.example.com
azuracast_traefik_network: traefik
azuracast_base_url: ""

# Cloudflare real IP forwarding
# Enable to fetch Cloudflare IPv4 ranges and configure trusted proxies.
azuracast_cloudflare_enabled: false
azuracast_cloudflare_ips_fallback:
  - 173.245.48.0/20
  - 103.21.244.0/22
  - 103.22.200.0/22
  - 103.31.4.0/22
  - 141.101.64.0/18
  - 108.162.192.0/18
  - 190.93.240.0/20
  - 188.114.96.0/20
  - 197.234.240.0/22
  - 198.41.128.0/17
  - 162.158.0.0/15
  - 104.16.0.0/13
  - 104.24.0.0/14
  - 172.64.0.0/13
  - 131.0.72.0/22
azuracast_trusted_proxies: []

# Resource limits (Docker Compose deploy.resources)
azuracast_memory_max: "2048m"
azuracast_memory_reservation: "1024m"
azuracast_cpus_max: "2"
azuracast_cpus_reservation: "1"

# Systemd service
azuracast_shutdown_timeout: 60
azuracast_service_enabled: true
azuracast_service_state: started
