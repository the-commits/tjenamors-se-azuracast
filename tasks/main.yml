---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_os_family | lower }}.yml"
    - "default.yml"

- name: Install prerequisites
  ansible.builtin.package:
    name: "{{ azuracast_prerequisites }}"
    state: present
    update_cache: true

- name: Install Docker
  block:
    - name: Check if Docker is already installed
      ansible.builtin.command: command -v docker
      changed_when: false
      failed_when: false
      register: docker_check

    - name: Run official Docker installer
      when: docker_check.rc != 0
      block:
        - name: Download get.docker.com script
          ansible.builtin.get_url:
            url: https://get.docker.com
            dest: /tmp/get-docker.sh
            mode: "0700"

        - name: Execute Docker installer
          ansible.builtin.command: sh /tmp/get-docker.sh
          args:
            creates: /usr/bin/docker

        - name: Remove installer script
          ansible.builtin.file:
            path: /tmp/get-docker.sh
            state: absent

        - name: Add ansible user to docker group
          ansible.builtin.user:
            name: "{{ ansible_user }}"
            groups: docker
            append: true
          when: ansible_user != 'root'

- name: Set docker compose command
  ansible.builtin.set_fact:
    azuracast_compose_cmd: >-
      docker compose -f {{ azuracast_base_dir }}/docker-compose.yml
      --project-directory {{ azuracast_base_dir }}

- name: Create AzuraCast directory
  ansible.builtin.file:
    path: "{{ azuracast_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ azuracast_base_dir }}/.env"
    owner: root
    group: root
    mode: "0644"

- name: Deploy azuracast.env file
  ansible.builtin.template:
    src: azuracast.env.j2
    dest: "{{ azuracast_base_dir }}/azuracast.env"
    owner: root
    group: root
    mode: "0644"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ azuracast_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Check if AzuraCast containers are already running
  ansible.builtin.command: >-
    {{ azuracast_compose_cmd }} ps --services --filter status=running
  args:
    chdir: "{{ azuracast_base_dir }}"
  changed_when: false
  failed_when: false
  register: azuracast_ps

- name: Pull Docker images
  ansible.builtin.command: >-
    {{ azuracast_compose_cmd }} pull
  args:
    chdir: "{{ azuracast_base_dir }}"
  register: compose_pull
  changed_when: compose_pull.stdout_lines | length > 0
  when: azuracast_ps.rc != 0

- name: Start AzuraCast containers
  ansible.builtin.command: >-
    {{ azuracast_compose_cmd }} up -d
  args:
    chdir: "{{ azuracast_base_dir }}"
  register: compose_up
  changed_when: compose_up.stdout is not search('is up-to-date')
  when: azuracast_ps.rc != 0

- name: Check if AzuraCast is already initialized
  ansible.builtin.stat:
    path: "{{ azuracast_base_dir }}/.initialized"
  register: initialized_check

- name: Run initial AzuraCast setup
  when:
    - azuracast_ps.rc != 0
    - not initialized_check.stat.exists
  block:
    - name: Execute azuracast_install inside container
      ansible.builtin.command: >-
        {{ azuracast_compose_cmd }} run --rm web azuracast_install
      args:
        chdir: "{{ azuracast_base_dir }}"
      register: install_result
      changed_when: true

    - name: Mark AzuraCast as initialized
      ansible.builtin.file:
        path: "{{ azuracast_base_dir }}/.initialized"
        state: touch
