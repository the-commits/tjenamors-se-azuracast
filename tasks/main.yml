---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_os_family | lower }}.yml"
    - "default.yml"

- name: Check available disk space at AzuraCast base directory
  ansible.builtin.command: df -B1 --output=avail "{{ azuracast_base_dir }}"
  register: azuracast_df_check
  changed_when: false
  failed_when: false

- name: Set disk space fact
  ansible.builtin.set_fact:
    azuracast_disk_space_gb: >-
      {{ (azuracast_df_check.stdout_lines[-1] | int / 1073741824) | int }}
  when: azuracast_df_check.rc == 0

- name: Assert minimum hardware requirements
  ansible.builtin.assert:
    that:
      - ansible_facts['architecture'] in ['x86_64', 'aarch64']
      - ansible_facts['memtotal_mb'] | int >= 2048
      - (azuracast_disk_space_gb | default(0) | int) >= 20
    fail_msg: >-
      AzuraCast minimum requirements not met:
      arch={{ ansible_facts['architecture'] }} (need x86_64 or aarch64),
      RAM={{ ansible_facts['memtotal_mb'] }}MB (need 2048MB+),
      disk={{ azuracast_disk_space_gb | default('?') }}GB (need 20GB+)
    quiet: true

- name: Ensure azuracast user is in docker group
  ansible.builtin.user:
    name: azuracast
    groups: docker
    append: true

- name: Look up azuracast user UID and GID
  ansible.builtin.getent:
    database: passwd
    key: azuracast

- name: Set azuracast user facts
  ansible.builtin.set_fact:
    azuracast_user_uid: "{{ ansible_facts['getent_passwd']['azuracast'][1] }}"
    azuracast_user_gid: "{{ ansible_facts['getent_passwd']['azuracast'][2] }}"

- name: Build docker compose command
  ansible.builtin.set_fact:
    azuracast_compose_cmd: >-
      /usr/bin/docker compose -f {{ azuracast_base_dir }}/docker-compose.yml
      --project-directory {{ azuracast_base_dir }}

- name: Create AzuraCast directory
  ansible.builtin.file:
    path: "{{ azuracast_base_dir }}"
    state: directory
    owner: "{{ azuracast_user_uid }}"
    group: "{{ azuracast_user_gid }}"
    mode: "0750"

- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ azuracast_base_dir }}/.env"
    owner: "{{ azuracast_user_uid }}"
    group: "{{ azuracast_user_gid }}"
    mode: "0640"

- name: Deploy azuracast.env file
  ansible.builtin.template:
    src: azuracast.env.j2
    dest: "{{ azuracast_base_dir }}/azuracast.env"
    owner: "{{ azuracast_user_uid }}"
    group: "{{ azuracast_user_gid }}"
    mode: "0640"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ azuracast_base_dir }}/docker-compose.yml"
    owner: "{{ azuracast_user_uid }}"
    group: "{{ azuracast_user_gid }}"
    mode: "0640"

- name: Check if AzuraCast containers are already running
  ansible.builtin.command: >-
    {{ azuracast_compose_cmd }} ps --services --filter status=running
  args:
    chdir: "{{ azuracast_base_dir }}"
  changed_when: false
  failed_when: false
  register: azuracast_ps

- name: Determine if AzuraCast needs first-run setup
  ansible.builtin.set_fact:
    azuracast_needs_setup: "{{ azuracast_ps.stdout_lines | length == 0 }}"

- name: Pull Docker images
  ansible.builtin.command: >-
    {{ azuracast_compose_cmd }} pull
  args:
    chdir: "{{ azuracast_base_dir }}"
  register: compose_pull
  changed_when: compose_pull.stdout_lines | length > 0
  when: azuracast_needs_setup

- name: Deploy systemd unit
  when:
    - ansible_facts['service_mgr'] == 'systemd'
    - azuracast_needs_setup
  block:
    - name: Deploy azuracast.service unit
      ansible.builtin.template:
        src: azuracast.service.j2
        dest: /etc/systemd/system/azuracast.service
        owner: root
        group: root
        mode: "0644"
      register: systemd_unit

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
      when: systemd_unit.changed

- name: Enable and start systemd service (one-time)
  when:
    - ansible_facts['service_mgr'] == 'systemd'
    - azuracast_needs_setup
  block:
    - name: Check if service is already enabled
      ansible.builtin.command: systemctl is-enabled azuracast
      changed_when: false
      failed_when: false
      register: svc_enabled

    - name: Enable service on first run
      ansible.builtin.command: systemctl enable azuracast
      when: svc_enabled.rc != 0

    - name: Check if service is already active
      ansible.builtin.command: systemctl is-active azuracast
      changed_when: false
      failed_when: false
      register: svc_active

    - name: Start service on first run
      ansible.builtin.command: systemctl start azuracast
      when: svc_active.rc != 0

    - name: Mark as started by systemd
      ansible.builtin.set_fact:
        azuracast_started: true

- name: Start directly via docker compose (non-systemd)
  when:
    - ansible_facts['service_mgr'] != 'systemd'
    - azuracast_needs_setup
  block:
    - name: Start AzuraCast containers
      ansible.builtin.command: >-
        {{ azuracast_compose_cmd }} up -d
      args:
        chdir: "{{ azuracast_base_dir }}"
      register: compose_up
      changed_when: compose_up.stdout is not search('is up-to-date')

    - name: Mark as started directly
      ansible.builtin.set_fact:
        azuracast_started: true

- name: Check if AzuraCast is already initialized
  ansible.builtin.stat:
    path: "{{ azuracast_base_dir }}/.initialized"
  register: initialized_check

- name: Wait for web container to be ready
  ansible.builtin.pause:
    seconds: 30
  when: not initialized_check.stat.exists

- name: Execute azuracast_install inside web container
  ansible.builtin.command: >-
    {{ azuracast_compose_cmd }} run --rm web azuracast_install
  args:
    chdir: "{{ azuracast_base_dir }}"
  register: install_result
  changed_when: true
  when: not initialized_check.stat.exists

- name: Mark AzuraCast as initialized
  ansible.builtin.file:
    path: "{{ azuracast_base_dir }}/.initialized"
    state: touch
  when: not initialized_check.stat.exists
