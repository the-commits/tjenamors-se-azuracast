---
- name: Verify
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Check Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false

    - name: Check AzuraCast base directory exists
      ansible.builtin.stat:
        path: /var/azuracast
      register: dir_check
      failed_when: not dir_check.stat.exists

    - name: Check .env file exists
      ansible.builtin.stat:
        path: /var/azuracast/.env
      register: env_check
      failed_when: not env_check.stat.exists

    - name: Check azuracast.env file exists
      ansible.builtin.stat:
        path: /var/azuracast/azuracast.env
      register: acenv_check
      failed_when: not acenv_check.stat.exists

    - name: Check docker-compose.yml exists
      ansible.builtin.stat:
        path: /var/azuracast/docker-compose.yml
      register: dc_check
      failed_when: not dc_check.stat.exists

    - name: Check systemd service unit
      ansible.builtin.stat:
        path: /etc/systemd/system/azuracast.service
      register: svc_check
      failed_when: ansible_service_mgr == 'systemd' and not svc_check.stat.exists

    - name: Verify service is enabled
      ansible.builtin.command: systemctl is-enabled azuracast
      changed_when: false
      when: ansible_service_mgr == 'systemd'
